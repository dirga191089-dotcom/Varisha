<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0B1622">
<title>Varisha Chess — Pantauan Orang Tua</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1622; --ink-soft:#12233A; --panel:#16283F; --line:#22364F;
  --gold:#C9A227; --gold-soft:#E7C65A; --cream:#EDE6D6; --muted:#8FA3BC;
  --green:#4FA96B; --red:#D1493C;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--ink);color:var(--cream);font-family:Archivo,system-ui,sans-serif}
.mono{font-family:'IBM Plex Mono',monospace}
.wrap{max-width:460px;margin:0 auto;padding:0 16px 96px}
a{color:inherit;text-decoration:none}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes sq{from{opacity:0;transform:scale(.4) rotate(-12deg)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes grow{from{width:0}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
.rise{animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
.sq{animation:sq .38s cubic-bezier(.2,.9,.3,1) both}
.spin{display:inline-block;animation:spin 1s linear infinite}
.grow{animation:grow .9s cubic-bezier(.2,.8,.3,1) both}
.pulse{animation:pulse 1.6s ease-in-out infinite}
.press{transition:transform .12s,opacity .12s}
.press:active{transform:scale(.96);opacity:.85}
@media(prefers-reduced-motion:reduce){.rise,.sq,.grow{animation:none!important;opacity:1!important;transform:none!important}}

header{padding:26px 0 8px}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:2px 0 2px;line-height:1.1}
.sub{font-size:12px;color:var(--muted);margin:0}
.crown{width:52px;height:52px;border-radius:16px;background:var(--gold);color:var(--ink);
  display:flex;align-items:center;justify-content:center;font-size:26px}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
.panel.hot{border-color:var(--gold)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.stat .l{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.stat .v{font-size:26px;font-weight:800;line-height:1.2}
.stat .s{font-size:10px;color:var(--muted)}

.chips{display:flex;gap:8px;overflow-x:auto;margin-top:16px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--ink-soft);border:1px solid var(--line);border-radius:12px;padding:8px 12px}
.chip .l{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;color:var(--muted)}
.chip .v{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600}

.board{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.board div{aspect-ratio:1;border-radius:4px;border:1px solid transparent}

.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tag{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;color:var(--ink)}
.item{display:flex;align-items:center;justify-content:space-between;background:var(--ink-soft);
  border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.item.gold{border-color:var(--gold)}
.bar{height:6px;border-radius:99px;background:var(--ink);overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;border-radius:99px}

.act{display:flex;gap:12px;background:var(--ink-soft);border-radius:12px;padding:8px 12px;margin-bottom:8px}
.act .m{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);min-width:34px;font-weight:600}
.det{display:none;border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
.det.open{display:block;animation:rise .4s both}
.chev{transition:transform .25s;color:var(--gold)}
.chev.up{transform:rotate(180deg)}

nav{position:fixed;left:0;right:0;bottom:0;background:rgba(11,22,34,.94);
  border-top:1px solid var(--line);backdrop-filter:blur(12px)}
nav div{max-width:460px;margin:0 auto;display:flex}
nav button{flex:1;background:none;border:0;color:var(--muted);padding:12px 0 10px;
  display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;font-size:10px;cursor:pointer}
nav button.on{color:var(--gold);font-weight:700}
nav .ind{height:2px;width:0;background:var(--gold);border-radius:99px}
nav button.on .ind{width:22px;animation:grow .5s both}
.ico{font-size:18px;line-height:1}
h3.sec{font-size:16px;font-weight:700;margin:6px 0 0}
p.body{font-size:13px;line-height:1.6;margin:6px 0 0}
li{font-size:13px;line-height:1.5;margin-bottom:6px}
ul{padding-left:18px;margin:6px 0 0}
</style>
</head>
<body>

<div class="wrap">
  <header class="rise">
    <div class="row">
      <div>
        <p class="eyebrow">Pantauan Orang Tua</p>
        <h1 id="nama">VarishaChess</h1>
        <p class="sub" id="sinkron">Menghubungi server…</p>
      </div>
      <div class="crown">♛</div>
    </div>
    <div class="chips" id="chips"></div>
  </header>

  <main id="isi"></main>
</div>

<nav>
  <div>
    <button class="on" data-tab="beranda"><span class="ico">◆</span>Beranda<span class="ind"></span></button>
    <button data-tab="partai"><span class="ico">♞</span>Partai<span class="ind"></span></button>
    <button data-tab="program"><span class="ico">◎</span>Program<span class="ind"></span></button>
  </div>
</nav>

<script>
/* ── Satu-satunya yang perlu diisi: URL Web App Apps Script.
   Ini bukan rahasia, tapi siapa pun yang tahu URL-nya bisa melihat statistik ini. ── */
const API = "https://script.google.com/macros/s/AKfycbwBi25zOYTaKUurp9bKsW_eKvFUG_Zgw2kES1HIQe7pRd8TlG4pXNG65nU8lEFiyYpe/exec";

const TEMA = {fork:"Garpu",pin:"Pin",skewer:"Skewer",hangingPiece:"Bidak Menggantung",
 backRankMate:"Mat Baris Belakang",mateIn1:"Mat 1 Langkah",mateIn2:"Mat 2 Langkah",mateIn3:"Mat 3 Langkah",
 discoveredAttack:"Serangan Terbuka",doubleCheck:"Skak Ganda",deflection:"Pengalihan",attraction:"Pemancingan",
 clearance:"Pembersihan Jalur",interference:"Interferensi",xRayAttack:"Serangan X-Ray",zugzwang:"Zugzwang",
 endgame:"Babak Akhir",rookEndgame:"Akhir Benteng",pawnEndgame:"Akhir Bidak",queensideAttack:"Serangan Sayap Menteri",
 kingsideAttack:"Serangan Sayap Raja",defensiveMove:"Langkah Bertahan",quietMove:"Langkah Tenang",
 sacrifice:"Pengorbanan",trappedPiece:"Buah Terperangkap",advancedPawn:"Bidak Maju",promotion:"Promosi",
 opening:"Pembukaan",middlegame:"Babak Tengah",capturingDefender:"Makan Pembela",intermezzo:"Intermezzo",
 exposedKing:"Raja Terbuka",smotheredMate:"Mat Tercekik",arabianMate:"Mat Arab",anastasiaMate:"Mat Anastasia",
 hookMate:"Mat Kait",crushing:"Menghancurkan",advantage:"Keunggulan",equality:"Menyamakan"};
const label = k => TEMA[k] || k;
const tgl = s => new Date(s).toLocaleDateString("id-ID",{day:"numeric",month:"short"});
const esc = s => String(s==null?"":s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));

let D = null, tab = "beranda";
const isi = document.getElementById("isi");

async function muat(){
  try{
    const r = await fetch(API);
    if(!r.ok) throw new Error("Server menjawab kode "+r.status);
    D = await r.json();
    document.getElementById("nama").textContent = D.user;
    document.getElementById("sinkron").textContent = "Tersinkron "+new Date(D.diperbarui).toLocaleString("id-ID",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
    chips();
    render();
  }catch(e){
    document.getElementById("sinkron").textContent = "Gagal memuat";
    isi.innerHTML = `<div class="panel" style="border-color:#4A2A2A">
      <h3 class="sec">Data tidak termuat</h3>
      <p class="body" style="color:var(--muted)">${esc(e.message)}. Periksa apakah URL Web App sudah diisi dan deployment-nya berakses "Anyone".</p>
      <button class="press" onclick="muat()" style="margin-top:12px;background:var(--gold);color:var(--ink);border:0;border-radius:10px;padding:9px 14px;font-weight:700;font-family:inherit;font-size:12px">Muat ulang</button>
    </div>`;
  }
}

function chips(){
  const s = D.ringkasan;
  document.getElementById("chips").innerHTML = [
    ["partai", s.total, ""],
    ["menang", s.winrate+"%", ""],
    ["akurasi", s.akurasi ? s.akurasi.toFixed(1)+"%" : "—", ""],
    ["blunder", s.blunder, ""]
  ].map(([l,v],i)=>`<div class="chip rise" style="animation-delay:${100+i*60}ms">
     <div class="l">${l}</div><div class="v">${v}</div></div>`).join("");
}

function render(){
  isi.innerHTML = tab==="beranda" ? beranda() : tab==="partai" ? partai() : program();
  isi.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>{
    const d = b.parentElement.querySelector(".det");
    d.classList.toggle("open");
    b.querySelector(".chev").classList.toggle("up");
  });
}

/* ── Beranda ── */
function beranda(){
  const s = D.ringkasan;
  const kartu = [
    ["Partai", s.total, `${s.menang}M · ${s.seri}S · ${s.kalah}K`],
    ["Kemenangan", s.winrate+"%", "dari 20 partai terakhir"],
    ["Akurasi", s.akurasi?s.akurasi.toFixed(1)+"%":"—", s.akurasi?"rata-rata terukur":"belum dianalisis mesin"],
    ["Blunder", s.blunder, s.kesalahan+" kesalahan"]
  ].map(([l,v,sub],i)=>`<div class="panel stat rise" style="margin:0;animation-delay:${i*70}ms">
      <div class="l">${l}</div><div class="v">${v}</div><div class="s">${sub}</div></div>`).join("");

  /* Papan Progres: 64 kotak = 64 hari terakhir */
  const hitung = {};
  D.partai.forEach(p=>{const d=new Date(p.tanggal).toDateString();hitung[d]=(hitung[d]||0)+1;});
  let kotak="";
  for(let i=63;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const n=hitung[d.toDateString()]||0, idx=63-i;
    const terang=(Math.floor(idx/8)+idx)%2===0;
    const bg = n ? `rgba(201,162,39,${.25+Math.min(n/4,1)*.75})` : (terang?"#1B2D46":"#152538");
    kotak += `<div class="sq" style="animation-delay:${idx*9}ms;background:${bg};${n?'border-color:var(--gold-soft)':''}" title="${d.toLocaleDateString("id-ID")} — ${n} partai"></div>`;
  }
  const aktif = Object.keys(hitung).length;

  const lemah = D.kelemahan.length ? D.kelemahan.slice(0,6).map((k,i)=>`
    <a class="item press" href="https://lichess.org/training/${esc(k.tema)}" target="_blank" rel="noreferrer">
      <div style="display:flex;gap:10px;align-items:center">
        <span class="mono" style="font-size:11px;color:var(--gold);width:18px">${String(i+1).padStart(2,"0")}</span>
        <div><div style="font-size:13px">${esc(label(k.tema))}</div>
        <div class="mono" style="font-size:9px;color:var(--muted)">${esc(k.sumber)}</div></div>
      </div>
      <span class="mono" style="font-size:10px;color:var(--muted)">bobot ${k.bobot} ›</span>
    </a>`).join("")
    : `<p class="body" style="color:var(--muted)">Belum ada. Daftar terisi setelah sinkronisasi malam berikutnya.</p>`;

  return `<div class="grid2">${kartu}</div>
  <div class="panel rise" style="animation-delay:120ms">
    <p class="eyebrow">Papan Progres — 64 hari</p>
    <div class="board" style="margin-top:12px">${kotak}</div>
    <p class="body" style="color:var(--muted);font-size:11px">Bermain di <b style="color:var(--cream)">${aktif}</b> hari. Kotak terang berarti hari itu bertanding.</p>
  </div>
  <div class="panel rise" style="animation-delay:160ms">
    <p class="eyebrow">Kelemahan terkumpul</p>
    <div style="margin-top:12px">${lemah}</div>
    <p style="font-size:10px;color:var(--muted);margin:4px 0 0">Ketuk untuk membuka puzzle bertema itu di Lichess.</p>
  </div>`;
}

/* ── Partai ── */
function partai(){
  if(!D.partai.length) return `<div class="panel"><p class="body" style="color:var(--muted)">Belum ada partai tersimpan.</p></div>`;
  return D.partai.map((p,i)=>{
    const a = D.analisis[p.id];
    const warna = p.hasil==="menang"?"var(--green)":p.hasil==="kalah"?"var(--red)":"var(--muted)";
    const nilai = a? Math.max(0,Math.min(100,Number(a.nilai)||0)) : null;
    const cn = nilai>=75?"var(--green)":nilai>=50?"var(--gold)":"var(--red)";
    return `<div class="panel rise" style="animation-delay:${Math.min(i,8)*50}ms">
      <button data-toggle class="press" style="width:100%;background:none;border:0;color:inherit;text-align:left;padding:0;font-family:inherit;cursor:pointer">
        <div class="row">
          <div style="flex:1">
            <div style="display:flex;gap:8px;align-items:center">
              <span class="tag" style="background:${warna}">${p.hasil.toUpperCase()}</span>
              <span class="mono" style="font-size:10px;color:var(--muted)">${esc(p.warna)} · ${esc(p.kecepatan)} · ${tgl(p.tanggal)}</span>
            </div>
            <div style="font-size:14px;font-weight:600;margin-top:6px">vs ${esc(p.lawan)}
              <span class="mono" style="font-size:11px;color:var(--muted)">(${esc(p.ratingLawan)})</span></div>
            <div style="font-size:11px;color:var(--muted)">${esc(p.pembukaan||"Pembukaan tidak tercatat")}</div>
          </div>
          <div style="text-align:right">
            <div class="mono" style="font-size:20px;font-weight:600;color:${p.akurasi?"var(--gold)":"var(--muted)"}">${p.akurasi?p.akurasi+"%":"—"}</div>
            <div class="mono" style="font-size:9px;color:var(--muted)">akurasi</div>
          </div>
        </div>
        <div class="row" style="margin-top:8px">
          <span style="font-size:11px;color:${a?"var(--green)":"var(--muted)"}">${a?`Dianalisis · nilai ${nilai}/100`:"Menunggu sinkronisasi malam"}</span>
          <span class="chev">▾</span>
        </div>
      </button>
      <div class="det">${a?`
        <div style="background:var(--ink-soft);border:1px solid var(--line);border-radius:12px;padding:12px">
          <div class="row"><span class="mono" style="font-size:9px;text-transform:uppercase;color:var(--muted)">Nilai permainan</span>
          <span class="mono" style="font-size:22px;font-weight:700;color:${cn}">${nilai}<span style="font-size:11px;color:var(--muted)">/100</span></span></div>
          <div class="bar"><i class="grow" style="width:${nilai}%;background:${cn}"></i></div>
          <p style="font-size:11px;color:var(--muted);margin:6px 0 0">${esc(a.alasanNilai)} · dasar penilaian: ${esc(a.sumberAkurasi)}</p>
        </div>
        <p class="eyebrow" style="margin-top:14px">Jalannya partai</p><p class="body">${esc(a.ringkasan)}</p>
        <p class="eyebrow" style="margin-top:14px">Kelebihan</p><ul>${String(a.kelebihan||"").split("|").filter(x=>x.trim()).map(x=>`<li>${esc(x.trim())}</li>`).join("")}</ul>
        <p class="eyebrow" style="margin-top:14px">Kelemahan</p><ul>${String(a.kelemahan||"").split("|").filter(x=>x.trim()).map(x=>`<li>${esc(x.trim())}</li>`).join("")}</ul>
        <p class="eyebrow" style="margin-top:14px">Arti angkanya</p><p class="body">${esc(a.komentarAkurasi)}</p>
        <p class="eyebrow" style="margin-top:14px">Latihan besok</p><p class="body">${esc(a.latihan)}</p>
        <p class="eyebrow" style="margin-top:14px">Tema puzzle berikutnya</p>
        <div style="margin-top:8px">${String(a.tema||"").split(",").filter(Boolean).map(t=>
          `<a class="item gold press" href="https://lichess.org/training/${esc(t)}" target="_blank" rel="noreferrer">
            <span style="font-size:13px;font-weight:600;color:var(--gold)">${esc(label(t))}</span><span style="color:var(--gold)">›</span></a>`).join("")}</div>
        <a class="press" href="https://lichess.org/${esc(p.id)}" target="_blank" rel="noreferrer"
          style="display:block;text-align:center;padding:9px;border:1px solid var(--line);border-radius:12px;color:var(--muted);font-size:12px;margin-top:12px">Buka papan di Lichess</a>
      `:`<p class="body" style="color:var(--muted)">Analisis dijadwalkan pada sinkronisasi berikutnya pukul 21.00.</p>`}</div>
    </div>`;
  }).join("");
}

/* ── Program ── */
function program(){
  if(!D.program.length) return `<div class="panel"><p class="body" style="color:var(--muted)">Program belum tersusun. Skrip menyusunnya setiap Senin pagi.</p></div>`;
  const p0 = D.program[0];
  const namaHari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"][new Date().getDay()];
  return `<div class="panel rise">
    <p class="eyebrow">Program pekan ini</p>
    <h3 class="sec">${esc(p0.judulPekan)}</h3>
    <p class="body" style="color:var(--muted)">${esc(p0.fokusUtama)}</p>
    <p class="mono" style="font-size:10px;color:var(--muted);margin-top:8px">disusun ${tgl(p0.dibuat)} · terbit ulang tiap Senin 06.00</p>
  </div>` + D.program.map((h,i)=>{
    const kini = h.hari===namaHari;
    return `<div class="panel rise ${kini?"hot":""}" style="animation-delay:${i*60}ms">
      <div class="row">
        <div style="display:flex;gap:8px;align-items:center">
          <span class="tag" style="background:${kini?"var(--gold)":"var(--ink-soft)"};color:${kini?"var(--ink)":"var(--muted)"}">${esc(h.hari).toUpperCase()}</span>
          ${kini?'<span class="mono" style="font-size:9px;color:var(--gold)">HARI INI</span>':''}
        </div>
        <span class="mono" style="font-size:10px;color:var(--muted)">${esc(h.menit)} mnt</span>
      </div>
      <h3 class="sec" style="margin-top:8px">${esc(h.tema)}</h3>
      <div style="margin-top:12px">${(h.aktivitas||[]).map(a=>
        `<div class="act"><span class="m">${esc(a.menit)}′</span>
         <div><div style="font-size:13px;font-weight:600">${esc(a.judul)}</div>
         <div style="font-size:11px;color:var(--muted);line-height:1.5">${esc(a.detail)}</div></div></div>`).join("")}</div>
      ${h.target?`<p style="font-size:11px;color:var(--muted);margin:8px 0 0">◇ ${esc(h.target)}</p>`:""}
      ${h.temaKey?`<a class="item gold press" style="margin-top:12px" href="https://lichess.org/training/${esc(h.temaKey)}" target="_blank" rel="noreferrer">
        <span style="font-size:12px;font-weight:600;color:var(--gold)">Mulai puzzle ${esc(label(h.temaKey))}</span><span style="color:var(--gold)">›</span></a>`:""}
    </div>`;
  }).join("");
}

document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("nav button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); tab=b.dataset.tab; render(); window.scrollTo(0,0);
});

muat();
</script>
</body>
</html>
